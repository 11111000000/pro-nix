name: Emacs E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v16
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Run lint-keys
        run: |
          chmod +x scripts/lint-keys.sh
          ./scripts/lint-keys.sh

      - name: Run headless Emacs E2E
        run: |
          nix-shell -p emacsPackages.vertico emacsPackages.consult emacsPackages.orderless emacsPackages.marginalia \
            emacsPackages.corfu emacsPackages.cape emacsPackages.vterm emacsPackages.ace-window \
            emacsPackages.consult-dash emacsPackages.consult-eglot emacsPackages.consult-yasnippet emacsPackages.embark --run "./scripts/emacs-pro-wrapper.sh --batch -l scripts/emacs-e2e-assertions.el"
