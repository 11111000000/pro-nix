name: Emacs E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v16
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Run lint-keys
        run: |
          chmod +x scripts/lint-keys.sh
          ./scripts/lint-keys.sh

      - name: Run headless Emacs E2E
        run: |
          # Generate provided-packages.el from the nix list so site-init can consume it
          emacs --batch -l scripts/generate-provided-packages.el --eval '(generate-provided-packages "nix/provided-packages.nix" "emacs/base/provided-packages.el")'

          # Run two headless checks: one with auto-install enabled (dev convenience)
          # and one with auto-install disabled (reproducibility check).
          echo "=== Run: auto-install=1 (default) ==="
          nix-shell -p emacsPackages.vertico emacsPackages.consult emacsPackages.orderless emacsPackages.marginalia \
            emacsPackages.corfu emacsPackages.cape emacsPackages.vterm emacsPackages.ace-window \
            emacsPackages.consult-dash emacsPackages.consult-eglot emacsPackages.consult-yasnippet emacsPackages.embark --run "./scripts/dev-emacs-pro-wrapper.sh --batch -l scripts/test-emacs-e2e-assertions.el -l scripts/test-emacs-e2e-run-tests.el" || ( echo "E2E failed (auto-install=1)"; exit 1 )

          echo "=== Run: auto-install=0 (reproducibility) ==="
          PRO_PACKAGES_AUTO_INSTALL=0 nix-shell -p emacsPackages.vertico emacsPackages.consult emacsPackages.orderless emacsPackages.marginalia \
            emacsPackages.corfu emacsPackages.cape emacsPackages.vterm emacsPackages.ace-window \
            emacsPackages.consult-dash emacsPackages.consult-eglot emacsPackages.consult-yasnippet emacsPackages.embark --run "./scripts/dev-emacs-pro-wrapper.sh --batch -l scripts/test-emacs-e2e-assertions.el -l scripts/test-emacs-e2e-run-tests.el" || ( echo "E2E failed (auto-install=0)"; exit 1 )
