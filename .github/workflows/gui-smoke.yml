name: GUI Smoke

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'emacs/**'
      - 'tests/gui/**'
      - 'tests/contract/**'
      - 'docs/**'
      - '.github/workflows/gui-smoke.yml'
  push:
    branches: [ main ]
    paths:
      - 'emacs/**'
      - 'tests/gui/**'
      - 'tests/contract/**'
      - 'docs/**'
      - '.github/workflows/gui-smoke.yml'

jobs:
  gui-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v16
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Run GUI smoke test (Nix)
        run: |
          set -euo pipefail
          # Use nix-shell to provide Emacs and X server (Xvfb)
          nix-shell -p emacs xorg.xorgserver --run "\
            Xvfb :99 -screen 0 1280x1024x24 & disown $!; \
            sleep 1; \
            DISPLAY=:99 emacs -Q -l tests/gui/gui-smoke.el --batch"
