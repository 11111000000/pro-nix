name: Validate PR

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v16
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Validate NixOS build (flake)
        env:
          NIXPKGS_ALLOW_UNFREE: 1
        run: |
          set -euo pipefail
          echo "Running nix build for cf19 nixos-rebuild (show-trace)"
          nix --extra-experimental-features 'nix-command flakes' build --print-out-paths '.#nixosConfigurations."cf19".config.system.build.nixos-rebuild' --no-link --show-trace

      - name: Run Emacs E2E tests (headless)
        run: |
          set -euo pipefail
          emacs --batch -l scripts/generate-provided-packages.el --eval '(generate-provided-packages "nix/provided-packages.nix" "emacs/base/provided-packages.el")'
          PRO_PACKAGES_AUTO_INSTALL=0 nix-shell -p emacsPackages.vertico emacsPackages.consult emacsPackages.orderless emacsPackages.marginalia \
            emacsPackages.corfu emacsPackages.cape emacsPackages.vterm emacsPackages.ace-window emacsPackages.embark --run "./scripts/emacs-pro-wrapper.sh --batch -l scripts/emacs-e2e-assertions.el -l scripts/emacs-e2e-run-tests.el"

      - name: Run HDS verification tools
        run: |
          set -euo pipefail
          chmod +x ./tools/holo-verify.sh ./tools/surface-lint.sh ./tools/docs-link-check.sh || true
          ./tools/holo-verify.sh || ( echo "holo-verify failed"; exit 1 )
          ./tools/surface-lint.sh || ( echo "surface-lint failed"; exit 1 )
          ./tools/docs-link-check.sh || ( echo "docs-link-check failed"; exit 1 )
