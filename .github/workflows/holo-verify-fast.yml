name: Holo Verify (fast)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    paths:
      - 'SURFACE.md'
      - 'HOLO.md'
      - 'modules/**'
      - 'nixos/**'

jobs:
  surface-and-holo-verify:
    name: Surface lint & Holo verify (fast)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install apt deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep jq

      - name: Setup Nix
        uses: cachix/install-nix-action@v16
        with:
          nix_path: 'nixpkgs=/nix/var/nix/profiles/per-user/root/channels/nixpkgs'

      - name: Run surface-lint (style checks; warnings allowed)
        run: |
          ./tools/surface-lint.sh --check-style || true

      - name: Run holo-verify (nixos-fast)
        env:
          # allow the helper scripts to use impure eval if necessary
          NIXPKGS_ALLOW_UNFREE: '1'
        run: |
          set -euo pipefail
          ./tools/holo-verify.sh nixos-fast
