name: Unit CI (flake + unit tests)

on:
  pull_request:
    branches: [ main ]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v17
      - name: Run flake show
        run: nix flake show --json .
      - name: Run unit holo-verify
        run: ./tools/holo-verify.sh unit
      - name: Run mkForce lint
        run: ./tools/mkforce-lint.sh
