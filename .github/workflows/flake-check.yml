name: Flake Check and Contract Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v17
        with:
          nix_path: nixpkgs=channel:nixos-23.11
      - name: Run nix flake check
        run: nix --extra-experimental-features 'nix-command flakes' flake check --show-trace || true
      - name: Run holo-verify
        run: ./tools/holo-verify.sh
