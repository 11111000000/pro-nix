name: Lint and E2E Tests

on: [push, pull_request]

jobs:
  lint-keys:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run lint-keys
        run: |
          chmod +x scripts/lint-keys.sh
          ./scripts/lint-keys.sh

  e2e-emacs:
    runs-on: ubuntu-latest
    needs: lint-keys
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y emacs-nox build-essential libncurses5-dev libgtk-3-dev libwebkit2gtk-4.0-dev libgconf-2-4
      - name: Run Emacs E2E assertions
        run: |
          emacs --batch -l scripts/test-emacs-e2e-assertions.el
