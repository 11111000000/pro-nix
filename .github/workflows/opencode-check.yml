name: Opencode Checks

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  verify:
    name: Verify repository contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run surface-lint
        run: |
          bash ./tools/surface-lint.sh --check-style
      - name: Run holo-verify (unit)
        run: |
          bash ./tools/holo-verify.sh unit
      - name: Run headless ERT
        run: |
          # Run headless ERT in CI; failures should fail the job so regressions are visible
          emacs --batch -l emacs/base/init.el -f ert-run-tests-batch
