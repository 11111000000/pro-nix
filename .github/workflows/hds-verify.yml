name: HDS Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  hds-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run HDS repository-local verification tools
        run: |
          set -euo pipefail
          chmod +x ./tools/holo-verify.sh ./tools/surface-lint.sh ./tools/docs-link-check.sh
          echo "Running holo-verify.sh"
          ./tools/holo-verify.sh
          echo "Running surface-lint.sh"
          # surface-lint must pass for repository health
          ./tools/surface-lint.sh
          echo "Running docs-link-check.sh"
          ./tools/docs-link-check.sh
