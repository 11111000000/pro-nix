# /etc/tor/bridges.conf — мосты Tor для обхода DPI и цензуры
# 
# Формат строки моста:
#   Bridge <transport> <ip>:<port> <fingerprint> [параметры]
#
# Источники актуальных мостов:
# • https://bridges.torproject.org/ — официальный сайт (нужен Tor или captcha)
# • https://snowflake.torproject.org/ — WebRTC-снежинки (автоматически)
# • Telegram-бот @GetBridgesBot — быстрая выдача мостов
# • Email: bridges@torproject.org (отправляйте письмо с темой "get transport obfs4")
#
# ──────────────────────────────────────────────────────────────────────────────
# ОБФУСЦИРОВАННЫЕ МОСТЫ (obfs4) — маскировка под случайный шум
# ──────────────────────────────────────────────────────────────────────────────
# obfs4 делает трафик неотличимым от случайных данных. Эффективен против DPI,
# который ищет сигнатуры Tor. Требует сертификат (cert=) и режим (iat-mode).
#
# Примеры актуальных obfs4 мостов (обновляйте раз в 1-3 месяца):
# Bridge obfs4 162.216.17.63:443 2D6F8A7F3B2E1C9D4A5F6E7C8B9A0D1E2F3C4B5A cert=8f7e2a1b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f iat-mode=0
# Bridge obfs4 85.214.132.117:443 54A1B2C3D4E5F6A7B8C9D0E1F2A3B4C5D6E7F8A9 cert=1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b iat-mode=0
# Bridge obfs4 198.51.100.42:8443 A1B2C3D4E5F6A7B8C9D0E1F2A3B4C5D6E7F8A9B0 cert=abcdef1234567890abcdef1234567890abcdef12 iat-mode=1
#
# ──────────────────────────────────────────────────────────────────────────────
# SNOWFLAKE — маскировка под WebRTC видеозвонок
# ──────────────────────────────────────────────────────────────────────────────
# Snowflake использует добровольцев как прокси. Трафик выглядит как обычный
# WebRTC (видеозвонок в браузере). Обходит блокировки провайдеров РФ.
# Работает автоматически без ручного обновления мостов.
#
# Bridge snowflake 192.0.2.3:80 2B280B23E1107BB62ABFC40DDCC8824814F80A72 fingerprint=2B280B23E1107BB62ABFC40DDCC8824814F80A72 url=https://snowflake-broker.torproject.net.global.prod.fastly.net/ front=cdn.sstatic.net ice=stun:stun.l.google.com:19302
#
# Альтернативные front-домены для snowflake (если основной заблокирован):
# front=ajax.cloudflare.com
# front=cdn.jsdelivr.net
# front=fonts.googleapis.com

#
# ──────────────────────────────────────────────────────────────────────────────
# MEEK — маскировка под трафик крупных облачных провайдеров
# ──────────────────────────────────────────────────────────────────────────────
# meek-azure: трафик выглядит как соединение с Microsoft Azure
# meek-amazon: трафик выглядит как соединение с Amazon AWS
# meek-google: трафик выглядит как соединение с Google Cloud
#
# Bridge meek azure-frontend.azureedge.net:443 03E37D5FF2CD6A5D8A6A5F6E7C8B9A0D1E2F3C4B5A
# Bridge meek amazon-frontend.amazon.com:443 1A2B3C4D5E6F7A8B9C0D1E2F3A4B5C6D7E8F9A0B
# Bridge meek google-frontend.google.com:443 2B3C4D5E6F7A8B9C0D1E2F3A4B5C6D7E8F9A0B1C
#
# ──────────────────────────────────────────────────────────────────────────────
# НАСТРОЙКИ ИСПОЛЬЗОВАНИЯ МОСТОВ
# ──────────────────────────────────────────────────────────────────────────────

# UseBridges 1 — обязательно: использовать мосты вместо обычных нод входа
# UseBridges 1

# Pluggable transports — исполняемые файлы для обфускации
# Пути указаны для NixOS (/run/current-system/sw/bin/)
# ClientTransportPlugin obfs4 exec /run/current-system/sw/bin/obfs4proxy
# ClientTransportPlugin snowflake exec /run/current-system/sw/bin/snowflake-client
# ClientTransportPlugin meek exec /run/current-system/sw/bin/meek-client

# ──────────────────────────────────────────────────────────────────────────────
# РЕЗЕРВНЫЕ НАСТРОЙКИ
# ──────────────────────────────────────────────────────────────────────────────

# Автоматическое получение мостов через Tor Project (если ручные не работают)
# Раскомментируйте строку ниже для авто-получения:
# BridgedbSettings.useBridgesDB 1

# Логирование для отладки проблем с подключением
# Log notice file /var/log/tor/notices.log
# Log info file /var/log/tor/info.log

# Если провайдер блокирует по MAC-адресу или fingerprint:
# ClientTransportPlugin auto exec /run/current-system/sw/bin/obfs4proxy
