device_name = "AT Translated Set 2 keyboard"
[[Application]]
executable = "firefox"

[[Application.Mapping]]
src = "KEY_LEFTCTRL+KEY_B"
dst = "KEY_LEFT"

[[Application.Mapping]]
src = "KEY_LEFTCTRL+KEY_F"
dst = "KEY_RIGHT"

[[Application.Mapping]]
src = "KEY_LEFTCTRL+KEY_P"
dst = "KEY_UP"

[[Application.Mapping]]
src = "KEY_LEFTCTRL+KEY_N"
