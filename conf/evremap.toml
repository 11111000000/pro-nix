[[Application.Mapping]]
src = "KEY_LEFTCTRL+KEY_A"
dst = "KEY_HOME"

[[Application.Mapping]]
src = "KEY_LEFTCTRL+KEY_E"
dst = "KEY_END"

[[Application.Mapping]]
src = "KEY_LEFTALT+KEY_B"
dst = "KEY_LEFTCTRL+KEY_LEFT"

[[Application.Mapping]]
src = "KEY_LEFTALT+KEY_F"
dst = "KEY_LEFTCTRL+KEY_RIGHT"


