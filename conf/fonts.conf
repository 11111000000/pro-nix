<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Prefer Aporetic Sans Mono for monospace, but keep other choices available -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Aporetic Sans Mono</family>
    </prefer>
  </alias>

  <!-- Prefer Aporetic Sans for sans-serif -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Aporetic Sans</family>
    </prefer>
  </alias>
</fontconfig>
